<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>籃球賽事管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div class="container mx-auto p-6">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-blue-600">🏀 籃球賽事管理系統</h1>
            <p class="text-gray-600">三層式架構展示專題</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-xl font-semibold mb-4">新增球隊</h2>
                <form id="teamForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">球隊名稱</label>
                        <input type="text" id="teamName" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">總教練</label>
                        <input type="text" id="coach" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50" required>
                    </div>
                    <button type="submit" class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">提交</button>
                </form>
            </div>

            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-xl font-semibold mb-4">球員數據排行榜</h2>
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-2 text-left text-xs font-medium text-gray-500">球員</th>
                                <th class="px-4 py-2 text-left text-xs font-medium text-gray-500">球隊</th>
                                <th class="px-4 py-2 text-left text-xs font-medium text-gray-500">得分</th>
                                <th class="px-4 py-2 text-left text-xs font-medium text-gray-500">助攻</th>
                            </tr>
                        </thead>
                        <tbody id="statsTable" class="divide-y divide-gray-200">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';

        // 載入數據
        async function loadStats() {
            const res = await fetch(`${API_URL}/players/stats`);
            const data = await res.json();
            const tbody = document.getElementById('statsTable');
            tbody.innerHTML = data.map(row => `
                <tr>
                    <td class="px-4 py-2 text-sm font-medium text-gray-900">${row.player_name} (#${row.jersey_number || 0})</td>
                    <td class="px-4 py-2 text-sm text-gray-500">${row.team_name}</td>
                    <td class="px-4 py-2 text-sm text-gray-500">${row.total_points || 0}</td>
                    <td class="px-4 py-2 text-sm text-gray-500">${row.total_assists || 0}</td>
                </tr>
            `).join('');
        }

        // 表單提交
        document.getElementById('teamForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const team_name = document.getElementById('teamName').value;
            const coach = document.getElementById('coach').value;

            await fetch(`${API_URL}/teams`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ team_name, coach })
            });

            alert('球隊新增成功！');
            document.getElementById('teamForm').reset();
            loadStats();
        });

        // 初始化
        loadStats();
    </script>
</body>
</html>
